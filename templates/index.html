<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>AI 回收辨識小幫手</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3e2723;
            --coffee-color: #5A3A29;
            --accent-color: #FF9800;
            --bg-color: #FFF8F0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-color) 0%, #FFEEDD 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(62, 39, 35, 0.15);
            max-width: 420px;
            width: 90%;
            margin: 20px;
        }

        .header {
            background: var(--primary-color);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .upload-limit-info {
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .upload-limit-info.warning {
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
        }

        .upload-limit-info .count {
            font-weight: bold;
            font-size: 18px;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 12px;
            border: 2px dashed var(--coffee-color);
            border-radius: 10px;
            width: 100%;
            background: #FFFAF5;
            cursor: pointer;
        }

        button {
            background: var(--coffee-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(90, 58, 41, 0.3);
        }

        button:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 58, 41, 0.4);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--coffee-color);
            text-decoration: none;
            font-size: 14px;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(62, 39, 35, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 320px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .modal-icon { font-size: 50px; margin-bottom: 15px; }
        .modal-title { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-bottom: 10px; }
        .modal-msg { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .modal-btn { background: var(--coffee-color); color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>

<body>
    <div class="container">
        <div class="user-info">
            <span class="username">👤 {{ username }}</span>
        </div>
        <div class="header">Reborn</div>

        {% if remaining_uploads is defined %}
        <div class="upload-limit-info {% if remaining_uploads == 0 %}warning{% endif %}">
            📸 今日剩餘上傳次數：<span class="count">{{ remaining_uploads }}</span> / {{ daily_limit }}
        </div>
        {% endif %}

        <div class="icon">♻️</div>
        <h2>AI 回收物品辨識</h2>
        <p>拍一張照片，AI 會教你如何正確回收！<br>答對還能獲得經驗值喔 ✨</p>

        <form action="/scan" method="post" enctype="multipart/form-data" onsubmit="this.querySelector('button').innerText='AI 辨識中...'; this.querySelector('button').disabled=true;">
            <input type="file" name="file" accept="image/*" required {% if remaining_uploads == 0 %}disabled{% endif %}>
            <br><br>
            <button type="submit" {% if remaining_uploads == 0 %}disabled{% endif %}>
                {% if remaining_uploads == 0 %}🚫 今日次數已用完{% else %}📷 開始辨識{% endif %}
            </button>
        </form>
        <a href="/" class="back-link">← 返回首頁</a>
    </div>

    <div class="modal-overlay" id="duplicate-modal">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">這張照片已經用過了！</div>
            <div class="modal-msg">請換一張新的照片再來挑戰吧～</div>
            <button class="modal-btn" onclick="closeModal('duplicate-modal')">知道了</button>
        </div>
    </div>

    <div class="modal-overlay" id="limit-modal">
        <div class="modal-content">
            <div class="modal-icon">⏰</div>
            <div class="modal-title">今日上傳次數已達上限！</div>
            <div class="modal-msg">
                每天最多只能上傳 {{ daily_limit }} 張照片喔～<br>
                <strong>明天再來挑戰吧！</strong>
            </div>
            <button class="modal-btn" onclick="closeModal('limit-modal')">好的，明天見！</button>
        </div>
    </div>

    <script>
        {% if duplicate_error %}
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('duplicate-modal').classList.add('show');
        });
        {% endif %}

        {% if daily_limit_error %}
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('limit-modal').classList.add('show');
        });
        {% endif %}

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }
    </script>
</body>

</html>
