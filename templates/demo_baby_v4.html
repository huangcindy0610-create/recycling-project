<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Animation V4 - Reborn</title>
    <link rel="stylesheet" href="static/style_v4.css">
    <style>
        /* CSS 優化：確保動畫流暢度與層級 */
        .stat-highlight { color: #ff0000; }
        .cup-full { transition: clip-path 3s cubic-bezier(0.4, 0, 0.2, 1) !important; }
        .character {
            background-image: url('static/baby.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: bottom center !important;
            transition: background-image 0.3s ease;
        }
        .character.cat { background-image: url('static/cat.png') !important; background-size: 280% auto !important; background-position: 10% calc(100% + 130px) !important; }
        .character.fox { background-image: url('static/fox.png') !important; background-size: contain !important; }
        .char-clipper { bottom: 125px !important; z-index: 15; }
        .character.jump { transform: translateY(1%) !important; opacity: 1; transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1) !important; }
        .bubble.show-bubble { opacity: 1; transform: scale(1); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; }
        
        /* 圖表與進度條樣式 */
        .exp-progress-fill { height: 100%; background: linear-gradient(90deg, #FFC107, #FF9800); transition: width 0.8s ease; }
        .chart-bars { border-bottom: 1px solid #ddd; border-left: 1px solid #ddd; height: 100px; display: flex; align-items: flex-end; }
        .bar { background: linear-gradient(180deg, #7B5544 0%, #5A3A29 100%); border-radius: 4px 4px 0 0; cursor: pointer; }
    </style>
</head>

<body class="baby">
    <div class="user-bar" style="position: fixed; top: 0; width: 100%; background: #5A3A29; color: white; padding: 10px; display: flex; justify-content: space-between; z-index: 1000;">
        <span>👤 {{ username }}</span>
        <a href="/logout" style="color: white; text-decoration: none; padding-right: 20px;">登出</a>
    </div>

    <div class="app-container" onclick="play()" style="padding-top: 60px;">
        <div class="header-box">Reborn</div>

        <div class="stats-box">
            <div class="exp-wrapper" style="padding: 10px;">
                <div class="exp-header" style="display: flex; justify-content: space-between;">
                    <span>經驗值 (EXP)</span>
                    <span id="level-display">Lvl. {{ level | default(0) }}</span>
                </div>
                <div class="exp-progress-container" style="background: #eee; height: 12px; border-radius: 6px; overflow: hidden;">
                    <div class="exp-progress-fill" id="exp-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="scene" style="position: relative; height: 300px;">
            <div class="char-clipper">
                <div class="character"></div>
            </div>
            <div class="cup-empty"></div>
            <div class="cup-full"></div>
        </div>

        <div class="bubble" style="background: white; border-radius: 15px; padding: 10px; margin: 10px; opacity: 0; transform: scale(0);">
            <span id="encourage-msg"></span>
            <hr>
            <a href="/scan" onclick="event.stopPropagation();" style="color: #5A3A29; font-weight: bold; text-decoration: none;">📷 拍照挑戰</a>
        </div>

        <div class="chart-title-outer" style="text-align: center; font-weight: bold; margin-top: 20px;">本週咖啡時光 (小時)</div>
        <div class="chart-box" style="display: flex; padding: 20px;">
            <div class="chart-y-axis" style="display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; color: #999;">
                <span>6h</span><span>4h</span><span>2h</span><span>0h</span>
            </div>
            <div class="chart-bars" style="flex-grow: 1; margin-left: 10px;">
                {% for i in range(7) %}
                {% set hours = chart_data[i] if chart_data else 0 %}
                {% set pct = (hours / 6 * 100) if hours <= 6 else 100 %}
                <div class="bar-group" style="flex: 1; display: flex; flex-direction: column; align-items: center;" onclick="showDayDetails({{ i }}, '星期{{ ['一','二','三','四','五','六','日'][i] }}')">
                    <div class="bar" style="height: {{ pct }}%; width: 60%;"></div>
                    <span style="font-size: 10px;">{{ ['一','二','三','四','五','六','日'][i] }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div id="day-details-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px;">
            <h3 id="day-modal-title">使用記錄</h3>
            <div id="day-sessions-list" style="max-height: 200px; overflow-y: auto;"></div>
            <button onclick="document.getElementById('day-details-modal').style.display='none'" style="width: 100%; margin-top: 10px; padding: 10px; background: #5A3A29; color: white; border: none; border-radius: 5px;">關閉</button>
        </div>
    </div>

    <script>
        // 核心數據
        const sessionsData = {{ sessions_data | tojson | safe }} || {};
        const currentExp = {{ xp | default(0) }};
        const currentLevel = {{ level | default(0) }};

        // 初始化經驗值條
        function updateUI() {
            const pct = (currentExp % 50 / 50) * 100;
            document.getElementById('exp-fill').style.width = pct + '%';
        }

        // 動畫邏輯
        function play() {
            const scene = document.querySelector('.scene');
            if (scene.classList.contains('active')) return;
            
            scene.classList.add('active');
            setTimeout(() => document.querySelector('.character').classList.add('jump'), 2950);
            setTimeout(() => {
                document.querySelector('.bubble').classList.add('show-bubble');
                generateEncouragement();
            }, 3500);
        }

        // 顯示單日詳情
        function showDayDetails(index, name) {
            const modal = document.getElementById('day-details-modal');
            const list = document.getElementById('day-sessions-list');
            document.getElementById('day-modal-title').innerText = name + ' 記錄';
            
            const sessions = sessionsData[index] || [];
            list.innerHTML = sessions.length ? sessions.map(s => `
                <div style="border-bottom: 1px solid #eee; padding: 5px 0;">
                    <small>⏱ ${s.duration}</small><br>
                    <b>${s.start} - ${s.end}</b>
                </div>
            `).join('') : '今日尚無記錄';
            
            modal.style.display = 'flex';
        }

        // 生成鼓勵訊息
        function generateEncouragement() {
            const total = {{ chart_data | sum if chart_data else 0 }};
            let msg = total > 5 ? "你本週是回收達人！🌱" : "今天也要記得做回收喔！☕";
            document.getElementById('encourage-msg').innerText = msg;
        }

        window.onload = updateUI;
    </script>
</body>
</html>
